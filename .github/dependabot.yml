version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    groups:
      development-dependencies:
        dependency-type: development
    ignore:
      - dependency-name: '@types/node'
        update-types:
          - version-update:semver-major
      - dependency-name: '@types/vscode'

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
