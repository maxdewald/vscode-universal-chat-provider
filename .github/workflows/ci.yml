name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up project
        uses: ./.github/actions/setup

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

  test:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
      fail-fast: false

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up project
        uses: ./.github/actions/setup

      - name: Test
        run: pnpm test

  test-coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up project
        uses: ./.github/actions/setup

      - name: Test with coverage
        run: pnpm test:coverage

      - name: Report coverage
        if: ${{ always() }}
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          json-summary-path: ./test/coverage/coverage-summary.json
          json-final-path: ./test/coverage/coverage-final.json

  test-build:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up project
        uses: ./.github/actions/setup

      - name: Build
        run: pnpm build

      - name: Package extension
        run: pnpm ext:package

  release:
    if: ${{ github.event_name == 'push' }}
    needs: [lint, test, test-coverage, test-build]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write

    steps:
      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@v5
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Checkout
        if: ${{ steps.release.outputs.release_created }}
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up project
        if: ${{ steps.release.outputs.release_created }}
        uses: ./.github/actions/setup

      - name: Package extension
        if: ${{ steps.release.outputs.release_created }}
        run: pnpm ext:package

      - name: Publish to Open VSX
        if: ${{ steps.release.outputs.release_created }}
        run: npx --yes ovsx@1.0.2 publish ./*.vsix
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}

      - name: Publish extension to VSC Marketplace
        if: ${{ steps.release.outputs.release_created }}
        run: pnpm exec vsce publish --packagePath ./*.vsix
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
